services:
  - type: web
    name: aurum-opt
    env: python
    buildCommand: pip install -r requirements.txt
    # Use a threaded worker so `/api/status` stays responsive while the optimizer
    # runs CPU-bound work in the same process (Render proxy will otherwise 502/503).
    startCommand: gunicorn server:app --bind 0.0.0.0:$PORT --workers 1 --threads 4 --timeout 300
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
