<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AURUM-OPT — Live Demo Pitch Script</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,700&family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --gold:#C9A84C;--gold-light:#E8C97A;--gold-dim:#7A6230;--gold-glow:rgba(201,168,76,.12);
  --bg:#0A0A08;--bg2:#111110;--bg3:#181816;--surface:#1E1E1B;
  --border:rgba(201,168,76,.14);--border2:rgba(201,168,76,.28);
  --text:#F0EDE4;--muted:#888878;--dim:#444438;
  --green:#1DB865;--green-dim:rgba(29,184,101,.1);
  --red:#D94F4F;--blue:#4A9ECC;
}
html{scroll-behavior:smooth}
body{
  font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);
  font-size:15px;line-height:1.7;min-height:100vh;
}

/* ── LAYOUT ── */
.wrap{display:flex;min-height:100vh}

/* ── SIDEBAR ── */
.side{
  width:270px;flex-shrink:0;background:var(--bg2);
  border-right:0.5px solid var(--border);
  position:sticky;top:0;height:100vh;
  display:flex;flex-direction:column;overflow-y:auto;
}
.side-logo{
  padding:22px 20px 18px;border-bottom:0.5px solid var(--border);
}
.logo-name{
  font-family:'Playfair Display',serif;font-weight:900;font-size:21px;
  color:var(--gold);letter-spacing:3px;text-transform:uppercase;
}
.logo-sub{font-size:10px;color:var(--muted);margin-top:4px;letter-spacing:.4px}

/* Timer */
.timer-box{padding:16px 20px;border-bottom:0.5px solid var(--border)}
.timer-lbl{font-size:9px;letter-spacing:1.8px;text-transform:uppercase;color:var(--dim);margin-bottom:5px}
.timer-val{
  font-family:'DM Mono',monospace;font-size:34px;font-weight:500;
  color:var(--gold);letter-spacing:2px;line-height:1;
}
.timer-track{height:2px;background:var(--bg3);border-radius:2px;margin-top:10px;overflow:hidden}
.timer-fill{height:100%;width:0%;background:linear-gradient(90deg,var(--gold-dim),var(--gold));border-radius:2px;transition:width 1s linear}
.timer-fill.over{background:var(--red)}

/* Nav */
.nav-list{padding:10px 10px;flex:1}
.nav-item{
  display:flex;align-items:flex-start;gap:10px;padding:9px 10px;border-radius:7px;
  cursor:pointer;border:none;background:none;width:100%;text-align:left;
  transition:background .15s;margin-bottom:2px;
}
.nav-item:hover{background:var(--bg3)}
.nav-item.on{background:rgba(201,168,76,.09)}
.nav-n{
  font-size:10px;font-weight:500;color:var(--dim);margin-top:2px;
  width:20px;flex-shrink:0;font-family:'DM Mono',monospace;
}
.nav-item.on .nav-n{color:var(--gold)}
.nav-info{flex:1;min-width:0}
.nav-title{font-size:12.5px;color:var(--muted);font-weight:400;line-height:1.3}
.nav-item.on .nav-title{color:var(--text);font-weight:500}
.nav-time{font-size:10px;color:var(--dim);margin-top:1px;font-family:'DM Mono',monospace}

/* Sidebar footer */
.side-foot{padding:16px 20px;border-top:0.5px solid var(--border)}
.timer-btn{
  width:100%;padding:9px;border-radius:7px;
  border:0.5px solid var(--border2);background:var(--gold-glow);
  color:var(--gold);font-family:'DM Sans',sans-serif;font-size:12px;font-weight:500;
  cursor:pointer;letter-spacing:.4px;transition:all .15s;
}
.timer-btn:hover{background:rgba(201,168,76,.2)}

/* ── MAIN ── */
.main{flex:1;padding:3.5rem 4.5rem;max-width:820px}

.panel{display:none;animation:up .3s ease}
.panel.on{display:block}
@keyframes up{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

/* Section header */
.s-eye{
  font-size:9px;letter-spacing:2.2px;text-transform:uppercase;
  color:var(--gold-dim);font-weight:500;margin-bottom:9px;
}
.s-title{
  font-family:'Playfair Display',serif;font-size:38px;font-weight:900;
  color:var(--text);line-height:1.1;letter-spacing:-0.5px;margin-bottom:14px;
}
.s-badge{
  display:inline-flex;align-items:center;gap:7px;
  padding:5px 13px;border-radius:20px;
  border:0.5px solid var(--border2);
  font-size:11px;color:var(--gold);background:var(--gold-glow);font-weight:500;
  letter-spacing:.3px;margin-bottom:2.5rem;
}
.s-badge::before{content:'';width:5px;height:5px;border-radius:50%;background:var(--gold)}

/* Script */
.script{font-size:16.5px;line-height:1.95;color:var(--text);font-weight:300;margin-bottom:1.3rem}
.b{font-weight:500;color:#F0EDE4}
hr.divider{border:none;border-top:0.5px solid var(--border);margin:2rem 0}

/* Quote */
.quote{
  margin:2rem 0;padding:1.4rem 2rem;
  border-left:2px solid var(--gold);
  background:rgba(201,168,76,.05);border-radius:0 8px 8px 0;
}
.quote p{
  font-family:'Playfair Display',serif;font-size:19px;font-weight:700;
  font-style:italic;color:var(--gold-light);line-height:1.5;
}

/* Stage note */
.note{
  padding:1rem 1.25rem;background:var(--surface);
  border-radius:8px;border:0.5px solid var(--border);margin:1.5rem 0;
}
.note-lbl{
  font-size:9px;letter-spacing:1.8px;text-transform:uppercase;
  color:var(--dim);font-weight:500;margin-bottom:5px;
}
.note p{font-size:13px;color:var(--muted);line-height:1.65}

/* Innovation card */
.inno{
  padding:1.4rem 1.6rem;border:0.5px solid var(--border);
  border-radius:10px;background:var(--bg2);margin-bottom:1.1rem;
}
.inno-n{font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(--gold-dim);margin-bottom:7px}
.inno-t{
  font-family:'Playfair Display',serif;font-size:17px;font-weight:700;
  color:var(--gold-light);margin-bottom:9px;
}
.inno p{font-size:15.5px;line-height:1.85;color:var(--text);font-weight:300}

/* Demo step */
.demo-step{
  display:flex;gap:14px;align-items:flex-start;
  padding:1.1rem 1.3rem;border-radius:9px;
  background:var(--bg2);border:0.5px solid var(--border);margin-bottom:.8rem;
}
.demo-icon{
  width:32px;height:32px;border-radius:50%;background:var(--gold-glow);
  border:0.5px solid var(--border2);display:flex;align-items:center;justify-content:center;
  flex-shrink:0;font-size:14px;font-family:'DM Mono',monospace;font-weight:500;color:var(--gold);
}
.demo-body{flex:1;min-width:0}
.demo-title{font-size:12.5px;font-weight:500;color:var(--text);margin-bottom:3px}
.demo-desc{font-size:13px;color:var(--muted);line-height:1.6}
.demo-action{
  display:inline-block;margin-top:5px;font-size:11px;
  font-family:'DM Mono',monospace;color:var(--green);
  background:var(--green-dim);padding:2px 8px;border-radius:4px;
}

/* Chips */
.chips{display:flex;flex-wrap:wrap;gap:7px;margin:1.3rem 0}
.chip{
  font-size:12px;padding:5px 13px;border-radius:20px;
  border:0.5px solid var(--border2);color:var(--muted);background:var(--bg2);
}

/* Closing */
.closing-line{
  font-family:'Playfair Display',serif;font-size:30px;font-weight:900;
  line-height:1.35;color:var(--gold-light);margin:2.2rem 0;letter-spacing:-.3px;
}

/* Bottom nav */
.bot-nav{
  display:flex;justify-content:space-between;align-items:center;
  margin-top:3rem;padding-top:2rem;border-top:0.5px solid var(--border);
}
.arr{
  display:flex;align-items:center;gap:6px;padding:9px 18px;
  border-radius:7px;border:0.5px solid var(--border2);
  background:none;color:var(--muted);font-family:'DM Sans',sans-serif;
  font-size:13px;font-weight:500;cursor:pointer;transition:all .18s;
}
.arr:hover:not(:disabled){background:var(--bg3);color:var(--text)}
.arr:disabled{opacity:.2;cursor:default}
.arr.next{background:var(--gold-glow);color:var(--gold)}
.arr.next:hover:not(:disabled){background:rgba(201,168,76,.2)}
.s-prog{font-size:11px;color:var(--dim);font-family:'DM Mono',monospace}
</style>
</head>
<body>

<div class="wrap">

<!-- SIDEBAR -->
<aside class="side">
  <div class="side-logo">
    <div class="logo-name">AURUM·OPT</div>
    <div class="logo-sub">Live Demo Pitch Script &nbsp;·&nbsp; 5 min</div>
  </div>

  <div class="timer-box">
    <div class="timer-lbl">Elapsed</div>
    <div class="timer-val" id="timerVal">0:00</div>
    <div class="timer-track"><div class="timer-fill" id="timerFill"></div></div>
  </div>

  <nav class="nav-list" id="navList"></nav>

  <div class="side-foot">
    <button class="timer-btn" id="timerBtn" onclick="toggleTimer()">▶ Start Timer</button>
  </div>
</aside>

<!-- MAIN -->
<main class="main" id="mainArea"></main>

</div>

<script>
const SECTIONS = [
  {
    label:"Opening Hook",
    time:"0:00–0:35",
    title:"Mining's Hidden Billions",
    badge:"0:00 – 0:35",
    body:`
      <div class="note"><div class="note-lbl">Before you open the dashboard</div><p>Stand still. Make eye contact. No screen yet. Let the room come to you.</p></div>

      <p class="script">Every year, the global mining industry loses <span class="b">billions of dollars</span> — not to accidents, not to theft — but to one simple problem: <span class="b">nobody knows the optimal way to plan the ore underground.</span></p>

      <p class="script">Mine planners today are doing this with spreadsheets, gut feel, and rules of thumb from the 1980s. For an industry extracting over a trillion dollars of mineral value every year, that is a stunning gap.</p>

      <div class="quote"><p>"The ore is worth billions. The plan to get it out? Still stuck in the past."</p></div>

      <div class="note"><div class="note-lbl">Delivery tip</div><p>Pause two full seconds after the quote. Then open AURUM-OPT on your screen. The splash animation runs — let it play. That first visual impression is part of the pitch.</p></div>
    `
  },
  {
    label:"The Problem",
    time:"0:35–1:20",
    title:"The Stope Optimization Problem",
    badge:"0:35 – 1:20",
    body:`
      <div class="note"><div class="note-lbl">On screen</div><p>Dashboard is open. The 3D Deposit view is showing the rotating ore block model. Leave it on auto-rotate.</p></div>

      <p class="script">What you're looking at is a 3D block model of a gold deposit. Every coloured point is a block of rock — and the colour tells you its gold grade, from near-zero in blue, all the way to high-grade ore in red and yellow.</p>

      <p class="script">The challenge is this: you need to group these blocks into <span class="b">stopes</span> — the underground chambers where ore gets blasted out. But which blocks? In what groupings? In what order? Too small and you leave money in the ground. Too big and you mix high-grade with waste and your entire batch gets diluted.</p>

      <div class="chips">
        <span class="chip">Thousands of candidate stopes per deposit</span>
        <span class="chip">Brute-force search is computationally impossible</span>
        <span class="chip">Every decision must be Z-aligned and regulation-compliant</span>
        <span class="chip">Dilution can silently erase 20–40% of ore value</span>
      </div>

      <p class="script">This is the stope optimization problem. And until now, no one had a tool that solved it <span class="b">provably, automatically, and in a form a real mine could actually use</span>.</p>

      <div class="note"><div class="note-lbl">Delivery tip</div><p>Hover over a bright red block in the 3D view. The grade tooltip pops up. Point to it: "That's a high-grade block — you want every one of those in a stope."</p></div>
    `
  },
  {
    label:"Software Walkthrough",
    time:"1:20–3:10",
    title:"AURUM-OPT: The Engine",
    badge:"1:20 – 3:10",
    body:`
      <div class="note"><div class="note-lbl">On screen</div><p>Walk through the three tabs in order: 3D Deposit → Results → Economics. Each demo step below maps to one action on screen.</p></div>

      <div class="demo-step">
        <div class="demo-icon">01</div>
        <div class="demo-body">
          <div class="demo-title">Upload a block model CSV &amp; run the optimizer</div>
          <div class="demo-desc">Point to the left sidebar — "Block Model CSV" upload and the "Run new cutoff" panel below it. Type a cutoff grade and hit Run.</div>
          <span class="demo-action">▶ Run optimizer</span>
        </div>
      </div>

      <p class="script">I enter a cutoff grade — say, <span class="b">5 grams per tonne</span> — and hit Run. Watch the progress bar. Under the hood, the engine is doing something most tools can't: it's using a <span class="b">3D prefix-sum table</span> to evaluate every candidate stope in constant time — no loops, no brute force. Think of it like a pre-computed financial ledger where any subtotal is instant.</p>

      <hr class="divider">

      <div class="demo-step">
        <div class="demo-icon">02</div>
        <div class="demo-body">
          <div class="demo-title">Switch to the Results tab</div>
          <div class="demo-desc">Click "Results" in the top nav. Show the five KPI cards — Total Gold, Waste Ratio, Stope Count, Mean Grade, Runtime.</div>
          <span class="demo-action">⬛ Results tab</span>
        </div>
      </div>

      <p class="script">The result is a set of <span class="b">non-overlapping, Z-aligned stopes</span> — those two green badges you can see on screen aren't cosmetic. They mean every stope passed compliance checks. The selection algorithm is <span class="b">dynamic programming</span> — the same family of algorithms behind shortest-path navigation. It guarantees the globally optimal selection. Not a good answer — <span class="b">the best possible answer</span>.</p>

      <p class="script">And look at the cutoff sensitivity table below. Every cutoff from 1 g/t up to your maximum has already been pre-computed. Click any row — the entire dashboard updates instantly. No re-run, no wait. Judges can ask "what if you dropped the cutoff to 3?" — I click it, the answer is already there.</p>

      <hr class="divider">

      <div class="demo-step">
        <div class="demo-icon">03</div>
        <div class="demo-body">
          <div class="demo-title">Show the AI Mine Planning panel</div>
          <div class="demo-desc">In the left sidebar, scroll to the green "AI Mine Planning Layer" card. Point to the three risk buckets: HIGH / MEDIUM / LOW dilution risk.</div>
          <span class="demo-action">AI risk model</span>
        </div>
      </div>

      <p class="script">This is the AI layer. Every stope gets a <span class="b">dilution risk score</span> — HIGH, MEDIUM, or LOW — based on its geometry and its neighbours. High-risk stopes get flagged: infill drill first, don't develop yet. Low-risk stopes are cleared for immediate development. The sequencing comes out of this automatically. A site engineer can take this plan and hand it straight to the drilling crew.</p>

      <hr class="divider">

      <div class="demo-step">
        <div class="demo-icon">04</div>
        <div class="demo-body">
          <div class="demo-title">Switch to the Economics tab</div>
          <div class="demo-desc">Click "Economics" in the top nav. Show the profit figure, break-even price, and drag the gold price slider.</div>
          <span class="demo-action">💰 Economics tab</span>
        </div>
      </div>

      <p class="script">Finally — money. The economics engine takes the optimized stopes, applies your mining cost, milling cost, and recovery rate, and spits out <span class="b">total net profit, revenue, break-even price per ounce, and profit per tonne</span>. And here's something a CFO will love: drag the gold price slider. The entire P&amp;L recalculates in real time — no re-run needed. You can stress-test the whole mine plan against a gold price crash without touching the optimizer.</p>

      <div class="note"><div class="note-lbl">Delivery tip</div><p>Drag the gold price slider down while you're talking. Let them see the numbers move live. That's the moment that makes business judges sit up.</p></div>
    `
  },
  {
    label:"Why It Works",
    time:"3:10–4:00",
    title:"Built for the Real World",
    badge:"3:10 – 4:00",
    body:`
      <div class="note"><div class="note-lbl">On screen</div><p>Stay on the Economics tab or flip back to Results — either is fine. You're speaking now, not clicking.</p></div>

      <p class="script">I want to address one question directly: <span class="b">"Why fixed stope geometry — isn't that limiting?"</span></p>

      <p class="script">In a research paper, flexible geometry looks elegant. In an actual mine, it's a nightmare. Equipment has standard footprints. Blast patterns have to be predictable. Structural engineers need deterministic dimensions. By using <span class="b">fixed prism geometry</span>, every stope AURUM-OPT produces is buildable without modification. No surprises underground. That's not a constraint — <span class="b">that's engineering discipline.</span></p>

      <p class="script">And compliance is baked in from the start. The <span class="b">Z-alignment check</span> runs before any stope enters the optimizer. The "Z-alignment PASS" badge you saw in the nav bar isn't a post-hoc report — it's a gate. A non-compliant plan never leaves the system. Regulators accept it. Site engineers trust it.</p>

      <div class="quote"><p>"The best optimization in the world is worthless if the mine can't actually build it."</p></div>

      <p class="script">AURUM-OPT closes that gap. It produces plans that go from dashboard straight to the drill rig — with a DXF export ready to load into any industry CAD tool.</p>

      <div class="note"><div class="note-lbl">Delivery tip</div><p>Point to the Export DXF button in the sidebar. "This file goes directly into CAD. No reformatting, no translation. It's mine-ready."</p></div>
    `
  },
  {
    label:"Closing",
    time:"4:00–5:00",
    title:"The Ore Was Always There.",
    badge:"4:00 – 5:00",
    body:`
      <div class="note"><div class="note-lbl">On screen</div><p>Keep the dashboard visible — whichever tab is most impressive from your demo. You want the software behind you as you close.</p></div>

      <p class="script">Let me bring it home. The global mining industry processes <span class="b">over a trillion dollars</span> in mineral value every year. Conservative estimates put planning inefficiency — suboptimal stope selection, poor sequencing, avoidable dilution — at somewhere between 5 and 15 percent of that figure. That's <span class="b">tens of billions of dollars, every year, left on the table</span>.</p>

      <p class="script">AURUM-OPT doesn't nudge that number. It attacks the root cause — with a prefix-sum engine that makes evaluation instant, dynamic programming that makes the selection provably optimal, an AI model that prices in dilution risk before it happens, and a live economics layer that turns ore data into a full mine P&amp;L in seconds.</p>

      <p class="script">What used to take a planning team two weeks now takes <span class="b">under a minute</span>. The plan is compliant, sequenced, and exportable. There is no manual step between this dashboard and the underground.</p>

      <div class="closing-line">"The ore was always there.<br>AURUM-OPT finally makes sure none of it goes to waste."</div>

      <p class="script" style="font-size:18px;font-weight:500;color:var(--muted)">Thank you.</p>

      <div class="note"><div class="note-lbl">Final delivery tip</div><p>After "Thank you" — do not move, do not look at the screen, do not smile immediately. Hold still for three full seconds. Let the closing line finish echoing. That silence is yours. It signals confidence. It wins rooms.</p></div>
    `
  }
];

let cur = 0, running = false, secs = 0, iv = null;
const TOTAL = 300;

function buildNav(){
  document.getElementById('navList').innerHTML = SECTIONS.map((s,i)=>`
    <button class="nav-item ${i===cur?'on':''}" onclick="go(${i})">
      <span class="nav-n">${String(i+1).padStart(2,'0')}</span>
      <div class="nav-info">
        <div class="nav-title">${s.label}</div>
        <div class="nav-time">${s.time}</div>
      </div>
    </button>
  `).join('');
}

function buildMain(){
  document.getElementById('mainArea').innerHTML = SECTIONS.map((s,i)=>`
    <div class="panel ${i===cur?'on':''}" id="p${i}">
      <div class="s-eye">Section ${i+1} of ${SECTIONS.length} &nbsp;·&nbsp; ${s.label}</div>
      <div class="s-title">${s.title}</div>
      <div class="s-badge">${s.badge}</div>
      ${s.body}
      <div class="bot-nav">
        <button class="arr prev" onclick="go(${i-1})" ${i===0?'disabled':''}>← Previous</button>
        <span class="s-prog">${i+1} / ${SECTIONS.length}</span>
        <button class="arr next" onclick="go(${i+1})" ${i===SECTIONS.length-1?'disabled':''}>Next →</button>
      </div>
    </div>
  `).join('');
}

function go(i){
  if(i<0||i>=SECTIONS.length)return;
  cur=i;
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('on'));
  document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('on'));
  document.getElementById('p'+i).classList.add('on');
  document.querySelectorAll('.nav-item')[i].classList.add('on');
  window.scrollTo({top:0,behavior:'smooth'});
}

function tick(){
  secs++;
  const m=Math.floor(secs/60),s=secs%60;
  document.getElementById('timerVal').textContent=m+':'+(s<10?'0':'')+s;
  const pct=Math.min(secs/TOTAL*100,100);
  const fill=document.getElementById('timerFill');
  fill.style.width=pct+'%';
  if(secs>=TOTAL)fill.classList.add('over');
}

function toggleTimer(){
  const btn=document.getElementById('timerBtn');
  if(running){clearInterval(iv);running=false;btn.textContent='▶ Resume Timer';}
  else{iv=setInterval(tick,1000);running=true;btn.textContent='⏸ Pause Timer';}
}

buildNav();buildMain();
</script>
</body>
</html>
